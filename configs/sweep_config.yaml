# WandB Sweep configuration for MiniGPT hyperparameter optimization
# Bayesian search over key training hyperparameters

method: bayes

metric:
  name: val_perplexity
  goal: minimize

parameters:
  lr:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-3

  warmup_steps:
    values: [500, 1000, 2000, 4000]

  batch_size:
    values: [4, 8, 16, 32]

  weight_decay:
    distribution: log_uniform_values
    min: 0.01
    max: 0.3

# Early termination to save resources
early_terminate:
  type: hyperband
  min_iter: 3
  eta: 3
  s: 2
